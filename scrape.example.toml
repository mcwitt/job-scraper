# Scraper configuration — copy to scrape.toml and edit.

# ── Built-in board scrapers ─────────────────────────────
# Each section maps ATS slugs to a table with at least a
# `name` key and an optional `cache_ttl` (seconds).
#
# Find a company's slug from their careers/jobs URL:
#   boards.greenhouse.io/SLUG
#   jobs.ashbyhq.com/SLUG
#   jobs.lever.co/SLUG
#   SLUG.breezy.hr
#   apply.workable.com/SLUG
#   api.gem.com/job_board/v0/SLUG/...
#   ats.rippling.com/SLUG
#   SLUG.hire.trakstar.com
#   careers.kula.ai/SLUG

[boards.greenhouse]
# anthropic.name = "Anthropic"

[boards.ashby]
# openai.name = "OpenAI"

[boards.lever]
# anyscale.name = "Anyscale"
# For EU-hosted boards:
# instadeep = { name = "InstaDeep", eu = true }

[boards.workday]
# Workday always requires instance and site params.
# Find these from the careers URL pattern:
#   https://COMPANY.INSTANCE.myworkdayjobs.com/.../SITE/...
# nvidia = { name = "NVIDIA", instance = "wd5", site = "NVIDIAExternalCareerSite" }

# Any board entry can include cache_ttl (seconds) to override
# the global --scrape-ttl for that scraper:
# mycompany = { name = "My Company", cache_ttl = 3600 }

[boards.gem]
# groq.name = "Groq"

[boards.rippling]
# rippling.name = "Rippling"

[boards.smartrecruiters]
# aristanetworks.name = "Arista Networks"

[boards.trakstar]
# terrapower.name = "TerraPower"

[boards.workable]
# huggingface.name = "Hugging Face"

[boards.icims]
# "careers.amd.com".name = "AMD"

[boards.phenom]
# "careers.snowflake.com".name = "Snowflake"

[boards.breezy]
# grid-united.name = "Grid United"

[boards.kula]
# archetype-ai.name = "Archetype AI"

# ── Custom scrapers ─────────────────────────────────────
# Python scripts that define:
#   async def scrape(http: Http) -> AsyncIterator[Job]
#
# [custom.mycompany]
# path = "scrapers/mycompany.py"
# cache_ttl = 3600  # optional per-scraper TTL override
#
# Or a subprocess that emits Job JSONL to stdout:
#
# [custom.mycompany]
# command = ["python", "scrapers/mycompany.py"]
